<text x="24" y="31" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="12" font-weight="800" fill="#0891B2">CENTRAL.DE.MISSÃO</text>
<text x="1156" y="31" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="11" fill="#64748B">SISTEMAS ATIVOS // 04</text>
