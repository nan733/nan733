    <stop offset="0.52" stop-color="#20B978"><animate attributeName="stop-color" values="#20B978;#4BC98F;#13734D;#20B978" dur="10s" repeatCount="indefinite"/></stop>
    <stop offset="1" stop-color="#4BC98F"><animate attributeName="stop-color" values="#4BC98F;#13734D;#2E7D57;#4BC98F" dur="10s" repeatCount="indefinite"/></stop>
  </linearGradient>
  <linearGradient id="portrait" x1="0" y1="0" x2="0.9" y2="1">
    <stop offset="0" stop-color="#20B978"/>
    <stop offset="0.5" stop-color="#13734D"/>
    <stop offset="1" stop-color="#2E7D57"/>
  </linearGradient>
  <radialGradient id="glow" cx="74%" cy="20%" r="72%">
    <stop offset="0" stop-color="#13734D" stop-opacity="0.14"/>
    <stop offset="0.55" stop-color="#2E7D57" stop-opacity="0.05"/>
    <stop offset="1" stop-color="#010403" stop-opacity="0"/>
  </radialGradient>
  <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
    <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#0C291B" stroke-width="1" opacity="0.46"/>
  </pattern>
  <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <clipPath id="scanClip"><rect x="22" y="62" width="1136" height="496" rx="12"/></clipPath>
</defs>
