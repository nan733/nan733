<defs>
  <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#7C3AED"><animate attributeName="stop-color" values="#7C3AED;#0891B2;#0F766E;#7C3AED" dur="10s" repeatCount="indefinite"/></stop>
    <stop offset="0.52" stop-color="#0891B2"><animate attributeName="stop-color" values="#0891B2;#0F766E;#2563EB;#0891B2" dur="10s" repeatCount="indefinite"/></stop>
