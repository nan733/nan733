<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="190" viewBox="0 0 1180 190" role="img" aria-labelledby="title desc">
<title id="title">Renan Oliveira, desenvolvedor Full-Stack em formação</title>
<desc id="desc">Cabeçalho visual com o nome Renan Oliveira e sua área de atuação.</desc>
<defs>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#0891B2"><animate attributeName="stop-color" values="#0891B2;#2563EB;#0891B2" dur="8s" repeatCount="indefinite"/></stop>
    <stop offset="0.52" stop-color="#2563EB"><animate attributeName="stop-color" values="#2563EB;#7C3AED;#2563EB" dur="8s" repeatCount="indefinite"/></stop>
    <stop offset="1" stop-color="#7C3AED"><animate attributeName="stop-color" values="#7C3AED;#0F766E;#7C3AED" dur="8s" repeatCount="indefinite"/></stop>
  </linearGradient>
  <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#0891B2" stop-opacity="0.34"/>
    <stop offset="0.5" stop-color="#2563EB" stop-opacity="0.24"/>
    <stop offset="1" stop-color="#7C3AED" stop-opacity="0.38"/>
  </linearGradient>
  <radialGradient id="glow" cx="50%" cy="18%" r="76%">
    <stop offset="0" stop-color="#0891B2" stop-opacity="0.14"/>
    <stop offset="0.5" stop-color="#2563EB" stop-opacity="0.06"/>
    <stop offset="1" stop-color="#F4F8FC" stop-opacity="0"/>
  </radialGradient>
  <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
    <path d="M24 0H0V24" fill="none" stroke="#DCE7F1" stroke-width="1" opacity="0.48"/>
  </pattern>
  <filter id="softGlow" x="-40%" y="-80%" width="180%" height="260%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <clipPath id="frameClip"><rect width="1180" height="190" rx="14"/></clipPath>
</defs>
<g clip-path="url(#frameClip)">
  <rect width="1180" height="190" fill="#F4F8FC"/>
  <rect width="1180" height="190" fill="url(#grid)"/>
  <rect width="1180" height="190" fill="url(#glow)"/>
  <path d="M0 0H1180V126C1000 105 829 99 660 108C448 119 232 145 0 160Z" fill="url(#wave)"/>
  <path d="M0 151C214 133 410 116 604 116C805 116 1000 140 1180 148V190H0Z" fill="#FFFFFF" fill-opacity="0.78"/>
  <path d="M0 151C214 133 410 116 604 116C805 116 1000 140 1180 148" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.72" filter="url(#softGlow)"/>
</g>
<rect x="3" y="3" width="1174" height="184" rx="12" fill="none" stroke="url(#accent)" stroke-width="2"/>
<g text-anchor="middle">
  <text x="590" y="76" font-family="Inter, Segoe UI, Arial, sans-serif" letter-spacing="0" font-size="46" font-weight="800" fill="#172033">Renan <tspan fill="#0891B2">Oliveira</tspan></text>
  <text x="590" y="111" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="17" font-weight="700" fill="#172033">DESENVOLVEDOR FULL-STACK EM FORMAÇÃO</text>
  <path d="M530 132H650" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" filter="url(#softGlow)"/>
  <circle cx="518" cy="132" r="3" fill="#0891B2"/>
  <circle cx="662" cy="132" r="3" fill="#7C3AED"/>
</g>
</svg>