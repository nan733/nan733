<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="210" viewBox="0 0 1180 210" role="img" aria-labelledby="title desc">
<title id="title">Central de missão de nan733</title>
<desc id="desc">Foco profissional, objetivos de estudo e princípios de desenvolvimento.</desc>
<defs>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#22D3EE"/><stop offset="0.52" stop-color="#60A5FA"/><stop offset="1" stop-color="#A78BFA"/></linearGradient>
  <pattern id="grid" width="22" height="22" patternUnits="userSpaceOnUse"><path d="M22 0H0V22" fill="none" stroke="#172337" opacity="0.42"/></pattern>
  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="1180" height="210" rx="14" fill="#070B14"/>
<rect width="1180" height="210" rx="14" fill="url(#grid)"/>
<rect x="3" y="3" width="1174" height="204" rx="12" fill="none" stroke="url(#accent)" stroke-width="2"/>
<text x="24" y="31" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="12" font-weight="800" fill="#22D3EE">CENTRAL.DE.MISSÃO</text>
<text x="1156" y="31" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="11" fill="#7E93AA">MÓDULOS // 03</text>
<path d="M24 43H1156" stroke="#172337"/>

<rect x="24" y="62" width="360" height="126" rx="8" fill="#0B1220" stroke="#172337"/>
<text x="43" y="86" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="12" font-weight="800" fill="#22D3EE">01 // FOCO.ATUAL</text>
<text x="43" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="18" font-weight="800" fill="#DCE8F5">Desenvolvimento Full-Stack</text>
<text x="43" y="140" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="11" fill="#7E93AA">interfaces web responsivas</text>
<text x="43" y="160" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="11" fill="#7E93AA">APIs + dados + visualizações</text>
<rect x="43" y="174" width="286" height="3" rx="2" fill="#172337"/><rect x="43" y="174" width="196" height="3" rx="2" fill="#2DD4BF"><animate attributeName="width" values="150;196;182;196" dur="4s" repeatCount="indefinite"/></rect>

<rect x="410" y="62" width="360" height="126" rx="8" fill="#0B1220" stroke="#172337"/>
<text x="429" y="86" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="12" font-weight="800" fill="#22D3EE">02 // PRÓXIMOS.ESTUDOS</text>
<text x="429" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="11" font-weight="700" fill="#DCE8F5">design de APIs + modelagem de dados</text>
<text x="429" y="140" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="11" font-weight="700" fill="#DCE8F5">sistemas de interfaces responsivas</text>
<text x="429" y="164" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="11" font-weight="700" fill="#DCE8F5">testes + entregas confiaveis</text>
<circle cx="740" cy="112" r="5" fill="#60A5FA"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite"/></circle>

<rect x="796" y="62" width="360" height="126" rx="8" fill="#0B1220" stroke="#172337"/>
<text x="815" y="86" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="12" font-weight="800" fill="#22D3EE">03 // VALORES.DE.ENTREGA</text>
<text x="815" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="11" font-weight="700" fill="#DCE8F5">util antes de chamativo</text>
<text x="815" y="140" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="11" font-weight="700" fill="#DCE8F5">claro antes de complexo</text>
<text x="815" y="164" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="11" font-weight="700" fill="#DCE8F5">seguro por padrão</text>
<circle cx="1126" cy="112" r="5" fill="#A78BFA"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" begin="0.5s" repeatCount="indefinite"/></circle>
</svg>