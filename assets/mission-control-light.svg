<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="410" viewBox="0 0 1180 410" role="img" aria-labelledby="title desc">
<title id="title">nan733 mission control</title>
<desc id="desc">Current build, learning goals, development principles, delivery pipeline and security status.</desc>
<defs>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#0891B2"/><stop offset="0.52" stop-color="#2563EB"/><stop offset="1" stop-color="#7C3AED"/></linearGradient>
  <pattern id="grid" width="22" height="22" patternUnits="userSpaceOnUse"><path d="M22 0H0V22" fill="none" stroke="#DCE7F1" opacity="0.42"/></pattern>
  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="1180" height="410" rx="14" fill="#F4F8FC"/>
<rect width="1180" height="410" rx="14" fill="url(#grid)"/>
<rect x="3" y="3" width="1174" height="404" rx="12" fill="none" stroke="url(#accent)" stroke-width="2"/>
<text x="24" y="31" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="12" font-weight="800" fill="#0891B2">MISSION.CONTROL</text>
<text x="1156" y="31" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="11" fill="#64748B">SYSTEMS ONLINE // 04</text>
<path d="M24 43H1156" stroke="#DCE7F1"/>

<rect x="24" y="62" width="360" height="126" rx="8" fill="#FFFFFF" stroke="#DCE7F1"/>
<text x="43" y="86" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="12" font-weight="800" fill="#0891B2">01 // BUILD.ACTIVE</text>
<text x="43" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="18" font-weight="800" fill="#172033">Controle Financeiro</text>
<text x="43" y="140" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="11" fill="#64748B">React + Vite dashboard</text>
<text x="43" y="160" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="11" fill="#64748B">data modeling + useful visualizations</text>
<rect x="43" y="174" width="286" height="3" rx="2" fill="#DCE7F1"/><rect x="43" y="174" width="196" height="3" rx="2" fill="#0F766E"><animate attributeName="width" values="150;196;182;196" dur="4s" repeatCount="indefinite"/></rect>

<rect x="410" y="62" width="360" height="126" rx="8" fill="#FFFFFF" stroke="#DCE7F1"/>
<text x="429" y="86" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="12" font-weight="800" fill="#0891B2">02 // LEARN.NEXT</text>
<text x="429" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="11" font-weight="700" fill="#172033">API design + data modeling</text>
<text x="429" y="140" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="11" font-weight="700" fill="#172033">responsive interface systems</text>
<text x="429" y="164" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="11" font-weight="700" fill="#172033">testing + reliable delivery</text>
<circle cx="740" cy="112" r="5" fill="#2563EB"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite"/></circle>

<rect x="796" y="62" width="360" height="126" rx="8" fill="#FFFFFF" stroke="#DCE7F1"/>
<text x="815" y="86" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="12" font-weight="800" fill="#0891B2">03 // SHIP.VALUES</text>
<text x="815" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="11" font-weight="700" fill="#172033">useful before flashy</text>
<text x="815" y="140" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="11" font-weight="700" fill="#172033">clear before complex</text>
<text x="815" y="164" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="11" font-weight="700" fill="#172033">secure by default</text>
<circle cx="1126" cy="112" r="5" fill="#7C3AED"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" begin="0.5s" repeatCount="indefinite"/></circle>

<rect x="24" y="212" width="1132" height="108" rx="8" fill="#FFFFFF" stroke="#DCE7F1"/>
<text x="43" y="238" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="12" font-weight="800" fill="#0891B2">DELIVERY.PIPELINE</text>
<path d="M105 279H1072" stroke="#DCE7F1" stroke-width="3"/>
<path d="M105 279H886" stroke="url(#accent)" stroke-width="3" stroke-dasharray="10 8"><animate attributeName="stroke-dashoffset" values="36;0" dur="2.2s" repeatCount="indefinite"/></path>
<g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="11" font-weight="700" fill="#172033" text-anchor="middle">
  <circle cx="105" cy="279" r="10" fill="#0891B2" filter="url(#glow)"/><text x="105" y="307">IDEA</text>
  <circle cx="347" cy="279" r="10" fill="#2563EB" filter="url(#glow)"/><text x="347" y="307">REACT + VITE</text>
  <circle cx="589" cy="279" r="10" fill="#0F766E" filter="url(#glow)"/><text x="589" y="307">PYTHON API</text>
  <circle cx="831" cy="279" r="10" fill="#7C3AED" filter="url(#glow)"/><text x="831" y="307">SQLITE / TURSO</text>
  <circle cx="1072" cy="279" r="10" fill="#64748B"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite"/></circle><text x="1072" y="307">INSIGHT</text>
</g>

<rect x="24" y="344" width="1132" height="42" rx="8" fill="#EDF5FB" stroke="#DCE7F1"/>
<text x="43" y="370" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="12" font-weight="800" fill="#0891B2">SECURITY.CHECK</text>
<g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="11" font-weight="700" fill="#172033">
  <circle cx="256" cy="365" r="5" fill="#0F766E"/><text x="270" y="369">LOCAL ASSETS</text>
  <circle cx="474" cy="365" r="5" fill="#0F766E"/><text x="488" y="369">NO JAVASCRIPT</text>
  <circle cx="709" cy="365" r="5" fill="#0F766E"/><text x="723" y="369">NO TOKENS</text>
  <circle cx="895" cy="365" r="5" fill="#0F766E"/><text x="909" y="369">NO TRACKERS</text>
</g>
</svg>