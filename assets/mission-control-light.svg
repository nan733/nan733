<text x="815" y="86" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="12" font-weight="800" fill="#0891B2">03 // VALORES.DE.ENTREGA</text>
<text x="815" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="11" font-weight="700" fill="#172033">util antes de chamativo</text>
<text x="815" y="140" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="11" font-weight="700" fill="#172033">claro antes de complexo</text>
