<text x="43" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="18" font-weight="800" fill="#172033">Controle Financeiro</text>
<text x="43" y="140" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="11" fill="#64748B">painel com React + Vite</text>
<text x="43" y="160" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="11" fill="#64748B">modelagem de dados + gráficos úteis</text>
