<defs>
  <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#A78BFA"><animate attributeName="stop-color" values="#A78BFA;#22D3EE;#2DD4BF;#A78BFA" dur="10s" repeatCount="indefinite"/></stop>
    <stop offset="0.52" stop-color="#22D3EE"><animate attributeName="stop-color" values="#22D3EE;#2DD4BF;#60A5FA;#22D3EE" dur="10s" repeatCount="indefinite"/></stop>
