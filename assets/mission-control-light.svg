<rect x="410" y="62" width="360" height="126" rx="8" fill="#FFFFFF" stroke="#DCE7F1"/>
<text x="429" y="86" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="12" font-weight="800" fill="#0891B2">02 // PRÓXIMOS.ESTUDOS</text>
<text x="429" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="11" font-weight="700" fill="#172033">design de APIs + modelagem de dados</text>
<text x="429" y="140" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="11" font-weight="700" fill="#172033">sistemas de interfaces responsivas</text>
<text x="429" y="164" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="11" font-weight="700" fill="#172033">testes + entregas confiaveis</text>
<circle cx="740" cy="112" r="5" fill="#2563EB"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite"/></circle>

