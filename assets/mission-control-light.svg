  <circle cx="1072" cy="279" r="10" fill="#64748B"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite"/></circle><text x="1072" y="307">RESULTADO</text>
</g>

<rect x="24" y="344" width="1132" height="42" rx="8" fill="#EDF5FB" stroke="#DCE7F1"/>
<text x="43" y="370" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0" font-size="12" font-weight="800" fill="#0891B2">VERIFICAÇÃO.DE.SEGURANÇA</text>
