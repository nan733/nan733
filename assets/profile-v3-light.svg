  </linearGradient>
  <linearGradient id="portrait" x1="0" y1="0" x2="0.9" y2="1">
    <stop offset="0" stop-color="#0891B2"/>
    <stop offset="0.5" stop-color="#2563EB"/>
    <stop offset="1" stop-color="#7C3AED"/>
  </linearGradient>
  <radialGradient id="glow" cx="74%" cy="20%" r="72%">
    <stop offset="0" stop-color="#2563EB" stop-opacity="0.14"/>
    <stop offset="0.55" stop-color="#7C3AED" stop-opacity="0.05"/>
    <stop offset="1" stop-color="#F4F8FC" stop-opacity="0"/>
  </radialGradient>
  <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
    <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#DCE7F1" stroke-width="1" opacity="0.46"/>
  </pattern>
  <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <clipPath id="scanClip"><rect x="22" y="62" width="1136" height="496" rx="12"/></clipPath>
</defs>
